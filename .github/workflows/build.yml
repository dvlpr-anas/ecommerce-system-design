name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:

  docker-build:
    name: docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - pricing-service
          - cart-service
          - order-service
          - inventory-service
          - payment-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ matrix.service }}:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  docker-build-web:
    name: docker build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.nextjs.template
          push: false
          load: true
          tags: web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: web:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  docker-build-admin-web:
    name: docker build admin-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.static.template
          push: false
          load: true
          tags: admin-web:ci
          cache-from: type=gha,scope=admin-web
          cache-to: type=gha,mode=max,scope=admin-web
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: admin-web:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
