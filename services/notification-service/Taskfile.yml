version: '3'

vars:
  SERVICE: notification-service
  PORT: '8088'

tasks:
  dev:
    desc: Run notification-service locally
    cmds:
      - go run ./cmd

  build:
    desc: Build notification-service binary
    cmds:
      - mkdir -p bin
      - go build -trimpath -o bin/notification-service ./cmd

  test:
    desc: Run unit tests for notification-service
    cmds:
      - go test ./...

  lint:
    desc: Lint notification-service
    cmds:
      - golangci-lint run ./...

  docker:build:
    desc: Build notification-service Docker image
    dir: '{{.USER_WORKING_DIR}}'
    cmds:
      - docker build -f services/notification-service/Dockerfile -t notification-service:dev .

  db:migrate:
    desc: Apply DB migrations for notification-service
    cmds:
      - 'goose -dir migrations postgres "$DATABASE_URL" up'
