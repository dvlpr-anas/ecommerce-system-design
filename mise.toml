# Pinned toolchain for sol_arch_proj.
# Installed by `mise install` inside the devcontainer (postCreateCommand).
# CI also installs from this file - one source of truth for tool versions.

[tools]
go     = "1.22.5"
node   = "20.11.1"
pnpm   = "9.7.0"
task   = "3.38.0"
tilt   = "0.33.20"
kubectl = "1.30.2"
k3d    = "5.7.3"
helm   = "3.15.2"

"go:github.com/pressly/goose/v3/cmd/goose"                       = "3.21.1"
"go:github.com/golangci/golangci-lint/cmd/golangci-lint"         = "1.59.1"
"go:github.com/air-verse/air"                                    = "1.52.3"
"go:golang.org/x/vuln/cmd/govulncheck"                           = "1.1.3"
"go:github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen"    = "2.3.0"

[env]
# Auto-load dev env on cd. Replaces every per-Taskfile dotenv line.
_.file = "infra/dev/.env.dev"
KUBECONFIG = "{{config_root}}/.kube/config"
