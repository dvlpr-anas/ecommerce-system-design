apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels: { app: payment-service, tier: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment-service }
  template:
    metadata:
      labels: { app: payment-service, tier: backend }
    spec:
      containers:
        - name: payment-service
          image: payment-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8087 }
          envFrom:
            - configMapRef: { name: sol-arch-env }
          env:
            - { name: PORT, value: "8087" }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector: { app: payment-service }
  ports:
    - { name: http, port: 8087, targetPort: http }
