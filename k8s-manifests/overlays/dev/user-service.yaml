apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels: { app: user-service, tier: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service, tier: backend }
    spec:
      containers:
        - name: user-service
          image: user-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8081 }
          envFrom:
            - configMapRef: { name: sol-arch-env }
          env:
            - { name: PORT, value: "8081" }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector: { app: user-service }
  ports:
    - { name: http, port: 8081, targetPort: http }
