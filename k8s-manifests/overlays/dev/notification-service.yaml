apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels: { app: notification-service, tier: backend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: notification-service }
  template:
    metadata:
      labels: { app: notification-service, tier: backend }
    spec:
      containers:
        - name: notification-service
          image: notification-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8088 }
          envFrom:
            - configMapRef: { name: sol-arch-env }
          env:
            - { name: PORT, value: "8088" }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector: { app: notification-service }
  ports:
    - { name: http, port: 8088, targetPort: http }
