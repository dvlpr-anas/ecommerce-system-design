# Dev Keycloak - same image as compose. Imports realm.json from the
# keycloak-realm ConfigMap and uses the in-cluster Postgres for storage.
# Promotion path for phase 07: Keycloak Operator.
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels: { app: keycloak, tier: infra }
spec:
  selector: { app: keycloak }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels: { app: keycloak }
  template:
    metadata:
      labels: { app: keycloak, tier: infra }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev", "--import-realm"]
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: KEYCLOAK_ADMIN,          value: admin }
            - { name: KEYCLOAK_ADMIN_PASSWORD, value: admin }
            - { name: KC_HEALTH_ENABLED,       value: "true" }
            - { name: KC_METRICS_ENABLED,      value: "true" }
            - { name: KC_HTTP_PORT,            value: "8080" }
            - { name: KC_DB,                   value: postgres }
            - { name: KC_DB_URL,               value: "jdbc:postgresql://postgres:5432/keycloak" }
            - { name: KC_DB_USERNAME,          value: postgres }
            - { name: KC_DB_PASSWORD,          value: postgres }
          volumeMounts:
            - { name: realm, mountPath: /opt/keycloak/data/import, readOnly: true }
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /health/live, port: http }
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
